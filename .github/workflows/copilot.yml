name: GitHub Copilot

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  copilot:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@copilot')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@copilot')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@copilot')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@copilot') || contains(github.event.issue.title, '@copilot')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot

      - name: Authenticate Copilot CLI with OAuth token
        env:
          COPILOT_TOKEN: ${{ secrets.COPILOT_TOKEN }}
        # COPILOT_TOKEN must be the OAuth token from your personal GitHub account
        # that has an active Copilot subscription. Fine-grained PATs don't work.
        #
        # To obtain it, run this locally (after `gh auth login`):
        #   gh auth token
        # Copy the gho_... value and save it as a repo secret named COPILOT_TOKEN:
        #   Settings → Secrets and variables → Actions → New repository secret
        run: |
          echo "$COPILOT_TOKEN" | gh auth login --with-token
          gh auth status

      - name: Extract request prompt
        id: prompt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          case "$GITHUB_EVENT_NAME" in
            issue_comment|pull_request_review_comment)
              PROMPT=$(jq -r '.comment.body' "$GITHUB_EVENT_PATH")
              ;;
            pull_request_review)
              PROMPT=$(jq -r '.review.body' "$GITHUB_EVENT_PATH")
              ;;
            issues)
              TITLE=$(jq -r '.issue.title' "$GITHUB_EVENT_PATH")
              BODY=$(jq -r '.issue.body' "$GITHUB_EVENT_PATH")
              PROMPT="$TITLE: $BODY"
              ;;
          esac

          # Strip @copilot mention prefix
          PROMPT=$(echo "$PROMPT" | sed 's/@copilot[[:space:]]*//')

          # Write to file to safely pass multi-line content between steps
          printf '%s' "$PROMPT" > /tmp/copilot_prompt.txt
          echo "prompt_file=/tmp/copilot_prompt.txt" >> "$GITHUB_OUTPUT"

      - name: Project Setup
        run: |
          npm run setup
          npm run dev:daemon
         
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run GitHub Copilot CLI
        id: copilot
        env:
          # Clear GH_TOKEN/GITHUB_TOKEN so the copilot CLI uses the gh auth store
          # populated above, not the Actions service-account token which lacks
          # Copilot subscription access.
          GH_TOKEN: ""
          GITHUB_TOKEN: ""
          COPILOT_MODEL: ${{ vars.COPILOT_MODEL || 'claude-haiku-4.5' }}
        run: |
          SYSTEM_CONTEXT="The project is already set up with all dependencies installed. The server is already running at localhost:3000. Logs from it are being written to logs.txt. If needed you can query the db with the 'sqlite3' cli. If needed use the mcp__playwright set of tools to launch a browser and interact with the app."

          # Escape prompt: replace " with \", collapse newlines/carriage returns into spaces
          PROMPT=$(cat /tmp/copilot_prompt.txt | tr '\r\n' '  ' | sed 's/"/\\"/g')

          # Playwright MCP server config — screenshots saved to /tmp/playwright-screenshots
          PLAYWRIGHT_MCP_CONFIG='{"mcpServers":{"playwright":{"command":"npx","args":["@playwright/mcp@latest","--output-dir","/tmp/playwright-screenshots"]}}}'

          echo "## GitHub Copilot Response" > /tmp/copilot_response.md
          echo "" >> /tmp/copilot_response.md

          # Run copilot; print stderr to Actions log AND append to response on failure
          if copilot -p "$SYSTEM_CONTEXT $PROMPT" \
              --allow-all-tools \
              --allow-all-paths \
              --additional-mcp-config "$PLAYWRIGHT_MCP_CONFIG" \
              --no-ask-user \
              -s \
              --model "$COPILOT_MODEL" \
              >> /tmp/copilot_response.md 2>/tmp/copilot_stderr.txt; then
            echo "Copilot succeeded" >&2
          else
            EXIT=$?
            echo "::error::copilot exited with code $EXIT" >&2
            cat /tmp/copilot_stderr.txt >&2
            echo "_Error: copilot CLI exited with code \`$EXIT\`. See Actions log for details._" >> /tmp/copilot_response.md
            cat /tmp/copilot_stderr.txt >> /tmp/copilot_response.md
          fi

          # Append footer
          echo "" >> /tmp/copilot_response.md
          echo "---" >> /tmp/copilot_response.md
          echo "_Processed by GitHub Copilot CLI via the \`copilot.yml\` workflow (model: \`$COPILOT_MODEL\`)._" >> /tmp/copilot_response.md

      - name: Attach screenshots to response
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SCREENSHOTS_DIR="/tmp/playwright-screenshots"
          if ! ls "$SCREENSHOTS_DIR"/*.png 2>/dev/null | head -1 > /dev/null; then
            echo "No screenshots found, skipping." >&2
            exit 0
          fi

          # Push screenshots to dedicated orphan branch so they have a stable raw URL
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          DEST_DIR="$GITHUB_RUN_ID"
          TMP_GIT=$(mktemp -d)
          cd "$TMP_GIT"
          git init -q
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git fetch origin ci-screenshots --depth=1 2>/dev/null; then
            git checkout -b ci-screenshots FETCH_HEAD
          else
            git checkout --orphan ci-screenshots
          fi

          mkdir -p "$DEST_DIR"
          cp "$SCREENSHOTS_DIR"/*.png "$DEST_DIR/"
          git add "$DEST_DIR"
          git commit -q -m "ci: screenshots from run $GITHUB_RUN_ID"
          git push origin ci-screenshots

          # Embed inline images in the response
          BASE_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/ci-screenshots/$DEST_DIR"
          echo "" >> /tmp/copilot_response.md
          echo "### Screenshots" >> /tmp/copilot_response.md
          for img in "$SCREENSHOTS_DIR"/*.png; do
            fname=$(basename "$img")
            echo "![$fname]($BASE_URL/$fname)" >> /tmp/copilot_response.md
          done

      - name: Post Copilot response as comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESPONSE=$(cat /tmp/copilot_response.md)

          case "$GITHUB_EVENT_NAME" in
            issue_comment|issues)
              ISSUE_NUMBER=$(jq -r '.issue.number // .comment.issue_url' "$GITHUB_EVENT_PATH" | grep -oE '[0-9]+$')
              gh issue comment "$ISSUE_NUMBER" --body "$RESPONSE"
              ;;
            pull_request_review_comment|pull_request_review)
              PR_NUMBER=$(jq -r '.pull_request.number // .review.pull_request_url' "$GITHUB_EVENT_PATH" | grep -oE '[0-9]+$')
              gh pr comment "$PR_NUMBER" --body "$RESPONSE"
              ;;
          esac

      # Optional: Configure the trigger phrase (default: @copilot)
      # To change it, update every 'contains(..., '@copilot')' expression in the job condition above
      # and the sed pattern in the "Extract request prompt" step.

      # Optional: Trigger when a specific user is assigned to an issue
      # Add this condition to the job `if`:
      #   (github.event_name == 'issues' && github.event.action == 'assigned' && github.event.assignee.login == 'copilot-bot')

      # Optional: Restrict which commands Copilot can suggest
      # Extend the "Run GitHub Copilot CLI" step with allowlist logic, e.g.
      #   | grep -E '^(npm|npx|git) ' to strip dangerous shell commands before posting
